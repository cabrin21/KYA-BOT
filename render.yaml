services:
  - type: worker
    name: dave-x-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SESSION_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dave-x-db
          property: connectionString

databases:
  - name: dave-x-db
    plan: free
